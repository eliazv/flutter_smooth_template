name: flutter_smooth_template
description: Template Flutter feature-first con moduli togglable.
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.7.0
  logger: ^2.4.0
  shared_preferences: ^2.3.2
  google_mobile_ads: ^5.1.0
  firebase_analytics: ^11.3.5
  app_tracking_transparency: ^2.0.6+1

  smooth_onboarding: ^0.2.3
  smooth_paywall: ^0.0.4
  smooth_bottom_sheet: ^0.0.4
  smooth_toast: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/illustrations/
    - assets/animations/
    - assets/audio/
    - assets/json/
